name: Device compatibility
description: Report a FUN60 variant or USB identifier
title: "[Device]: "
labels: [compatibility]
body:
  - type: input
    id: model
    attributes:
      label: Model
      placeholder: FUN60 Pro
    validations:
      required: true
  - type: input
    id: usb
    attributes:
      label: USB VID and PID
      placeholder: 3151:5029
    validations:
      required: true
  - type: input
    id: firmware
    attributes:
      label: Firmware version
    validations:
      required: true
  - type: dropdown
    id: connection
    attributes:
      label: Connection tested
      options:
        - Wired USB
        - 2.4 GHz
        - Bluetooth
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Features tested and results
    validations:
      required: true
